<svg viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0369a1;stop-opacity:1" />
    </linearGradient>
    <filter id="iconShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Rounded background -->
  <rect width="180" height="180" rx="45" fill="url(#iconGradient)" filter="url(#iconShadow)"/>
  
  <!-- Dumbbell Design -->
  <!-- Left weight plate (larger) -->
  <rect x="28" y="65" width="24" height="50" rx="3" fill="rgba(255,255,255,0.95)"/>
  
  <!-- Left bar -->
  <rect x="52" y="75" width="18" height="30" rx="2" fill="rgba(255,255,255,0.9)"/>
  
  <!-- Center grip -->
  <rect x="70" y="68" width="40" height="44" rx="4" fill="rgba(255,255,255,0.98)"/>
  
  <!-- Center grip details -->
  <line x1="75" y1="75" x2="75" y2="105" stroke="rgba(3,105,161,0.15)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="85" y1="75" x2="85" y2="105" stroke="rgba(3,105,161,0.15)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="95" y1="75" x2="95" y2="105" stroke="rgba(3,105,161,0.15)" stroke-width="1.5" stroke-linecap="round"/>
  
  <!-- Right bar -->
  <rect x="110" y="75" width="18" height="30" rx="2" fill="rgba(255,255,255,0.9)"/>
  
  <!-- Right weight plate -->
  <rect x="128" y="65" width="24" height="50" rx="3" fill="rgba(255,255,255,0.95)"/>
  
  <!-- Highlight/shine effect on dumbbell -->
  <ellipse cx="90" cy="72" rx="35" ry="8" fill="rgba(255,255,255,0.3)"/>
  
  <!-- Small accent dots -->
  <circle cx="45" cy="55" r="2.5" fill="rgba(255,255,255,0.6)"/>
  <circle cx="135" cy="55" r="2.5" fill="rgba(255,255,255,0.6)"/>
</svg>